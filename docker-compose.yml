services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mpgames-app
    labels:
      - traefik.enable=true
      - traefik.http.routers.mpgames-app.rule=Host(`mpgames.io`)
    networks:
      - default
      - traefik
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    container_name: mpgames-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mpgames}
      POSTGRES_USER: ${DB_USERNAME:-mpgames}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:0:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mpgames}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  app-storage:
  app-logs:

networks:
  traefik:
    external: true
